<div id="tab-tls" class="tab-content">
    <div class="flex flex-wrap gap-2 mb-4 items-center filter-bar">
        <div class="relative flex-1 min-w-48">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm" style="color:var(--muted)"></i>
            <input type="text" id="tlsOptsSearch" oninput="filterTlsOptions()" placeholder="Search TLS profiles..." class="input-field pl-9">
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg); border:1px solid var(--border)">
            <button onclick="refreshTlsOptionsTab()" class="proto-btn text-xs px-3 py-1.5" title="Refresh"><i class="ph-bold ph-arrows-clockwise"></i></button>
        </div>
        <button onclick="openTlsOptionModal()" class="btn-primary text-xs px-3 py-2">
            <i class="ph-bold ph-plus mr-1"></i> Add TLS Profile
        </button>
    </div>
    <div id="tlsOptsContent">
        <div class="text-center py-16" style="color:var(--muted)">
            <i class="ph-light ph-spinner-gap text-4xl block mb-3 animate-spin opacity-40"></i>
            <p>Loading TLS profiles...</p>
        </div>
    </div>
</div>
