<script>window._hostCsEnabled = {{ crowdsec_enabled | tojson }};</script>
<div id="tab-crowdsec" class="tab-content">
    <div id="csNotConfigured" class="flex flex-col items-center justify-center py-20 gap-4" style="color:var(--muted);display:none!important">
        <i class="ph-light ph-shield-slash text-5xl opacity-40"></i>
        <div class="text-center">
            <p class="font-medium text-sm mb-1" style="color:var(--text)">CrowdSec not configured</p>
            <p class="text-xs">Add your LAPI URL and API key in <strong>Settings &rarr; System Monitoring &rarr; CrowdSec</strong></p>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-4 items-center filter-bar">
        <div class="relative flex-1 min-w-0">
            <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm" style="color:var(--muted)"></i>
            <input type="text" id="csSearch" oninput="_csDecisionsPage=1;_csApplyFilters()" placeholder="Filter by IP or scenario..." class="input-field pl-9">
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg);border:1px solid var(--border)">
            <button onclick="_setCsView('decisions',this)" id="cs-view-decisions" class="proto-btn active-http text-xs px-3 py-1.5">Decisions</button>
            <button onclick="_setCsView('alerts',this)" id="cs-view-alerts" class="proto-btn text-xs px-3 py-1.5">Alerts</button>
        </div>
        <div id="csTypeFilter" class="flex gap-1 p-1 rounded-lg fb-secondary" style="background:var(--input-bg);border:1px solid var(--border)">
            <button onclick="_setCsType('all',this)" id="cs-type-all" class="proto-btn active-http text-xs px-3 py-1.5">All</button>
            <button onclick="_setCsType('ban',this)" id="cs-type-ban" class="proto-btn text-xs px-3 py-1.5">Ban</button>
            <button onclick="_setCsType('captcha',this)" id="cs-type-captcha" class="proto-btn text-xs px-3 py-1.5">Captcha</button>
            <button onclick="_setCsType('bypass',this)" id="cs-type-bypass" class="proto-btn text-xs px-3 py-1.5">Bypass</button>
        </div>
        <div id="csAddDecisionBtn" class="flex gap-1 p-1 rounded-lg fb-secondary" style="background:var(--input-bg);border:1px solid var(--border)">
            <button onclick="openCsBanModal()" class="proto-btn text-xs px-3 py-1.5"><i class="ph-bold ph-plus"></i> Add Decision</button>
        </div>
        <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg);border:1px solid var(--border)">
            <button onclick="refreshCrowdSecTab()" class="proto-btn text-xs px-3 py-1.5" title="Refresh"><i class="ph-bold ph-arrows-clockwise"></i></button>
        </div>
    </div>

    <div id="crowdsecStats" class="grid grid-cols-3 gap-3 mb-4"></div>

    <div id="csDecisionsSection">
        <div class="flex items-center gap-2 mb-2">
            <span class="font-semibold text-sm" style="color:var(--text)">Active Decisions</span>
            <span id="csDecisionCount" class="text-xs px-2 py-0.5 rounded-full" style="background:var(--input-bg);border:1px solid var(--border);color:var(--muted)">0</span>
        </div>
        <div id="csDecisionsTable" class="rounded-lg overflow-hidden" style="border:1px solid var(--border)">
            <div class="text-center py-8" style="color:var(--muted)">
                <i class="ph-light ph-spinner-gap text-3xl block mb-2 animate-spin opacity-40"></i>
                <p class="text-xs">Loading decisions...</p>
            </div>
        </div>
    </div>

    <div id="csAlertsSection" style="display:none">
        <div class="flex items-center gap-2 mb-2">
            <span class="font-semibold text-sm" style="color:var(--text)">Recent Alerts</span>
            <span id="csAlertCount" class="text-xs px-2 py-0.5 rounded-full" style="background:var(--input-bg);border:1px solid var(--border);color:var(--muted)">0</span>
        </div>
        <div id="csAlertsTable" class="rounded-lg overflow-hidden" style="border:1px solid var(--border)">
            <div class="text-center py-8" style="color:var(--muted)">
                <i class="ph-light ph-spinner-gap text-3xl block mb-2 animate-spin opacity-40"></i>
                <p class="text-xs">Loading alerts...</p>
            </div>
        </div>
    </div>

</div>

<div id="csBanModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5)" onclick="if(event.target===this)closeCsBanModal()">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;width:380px">
        <div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--border)">
            <span class="font-semibold text-sm">Add Decision</span>
            <button onclick="closeCsBanModal()" class="btn-icon"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="flex flex-col gap-4 p-4">
            <div id="csBanError" style="display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--red)" class="flex items-center gap-2">
                <i class="ph-bold ph-warning-circle flex-shrink-0"></i>
                <span id="csBanErrorMsg"></span>
            </div>
            <div class="field">
                <label>IP / Range</label>
                <input type="text" id="csBanIp" class="input-field" placeholder="1.2.3.4 or 1.2.3.0/24">
            </div>
            <div class="field">
                <label>Type</label>
                <div class="flex gap-1 p-1 rounded-lg" style="background:var(--input-bg);border:1px solid var(--border);width:fit-content">
                    <button onclick="_setCsBanType('ban',this)" id="csBanType-ban" class="proto-btn active-http text-xs px-3 py-1.5">Ban</button>
                    <button onclick="_setCsBanType('captcha',this)" id="csBanType-captcha" class="proto-btn text-xs px-3 py-1.5">Captcha</button>
                    <button onclick="_setCsBanType('bypass',this)" id="csBanType-bypass" class="proto-btn text-xs px-3 py-1.5">Bypass</button>
                </div>
            </div>
            <div class="field">
                <label>Duration</label>
                <select id="csBanDuration" class="input-field">
                    <option value="1h">1 hour</option>
                    <option value="4h">4 hours</option>
                    <option value="24h" selected>24 hours</option>
                    <option value="168h">7 days</option>
                    <option value="720h">30 days</option>
                    <option value="8760h">1 year</option>
                </select>
            </div>
            <div class="field">
                <label>Reason <span style="color:var(--muted);font-weight:normal">(optional)</span></label>
                <input type="text" id="csBanReason" class="input-field" placeholder="manual ban from Traefik Manager">
            </div>
            <button onclick="submitCsBan()" class="btn-primary w-full mt-1">Add Decision</button>
        </div>
    </div>
</div>
